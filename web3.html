<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Bingo — Jugador</title>
    <link href="css/style.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body data-page="web3">
    <header class="topbar">
        <a class="brand-badge" href="../">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23b8d4e3' stroke='%234a90e2'/%3E%3C/text%3E%3C/svg%3E" width="32" height="32" alt="Logo">
        </a>
    </header>

    <main class="center" style="padding:12px;">
        <h2>Vista Jugador</h2>
        <p>Introduce el código que te dio el anfitrión o abre el enlace que te enviaron.</p>

        <div id="myCardsTrackerContainer" class="control-box" style="margin-top:12px;">
            <h3>Seguir Cartones</h3>
            <label for="myCardNumbersInput">Números de cartón (ej: 7, 15, 23):</label>
            <input type="text" id="myCardNumbersInput" placeholder="Números separados por coma" style="width:100%; margin:8px 0;">
            <button onclick="trackMyCards()" class="btn">Confirmar</button>
            <div id="trackerMsg" style="margin-top:8px; font-weight:bold; color:#28a745;"></div>
            <div id="myTrackedBingosList" style="margin-top:10px;">---</div>
            <div id="myTrackedCardPreview" style="margin-top:10px;"></div>
        </div>

        <div id="ultimosNumeros" style="margin-top:18px;">
            <p>Últimos números:</p>
            <div id="ultimosNumerosContainer"></div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
